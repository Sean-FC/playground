apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api
  namespace: argo
spec:
  project: core
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated: {}
    syncOptions:
      - ServerSideApply=true
  source:
    repoURL: git@github.com:Sean-FC/playground.git
    targetRevision: feat/ingress
    path: argo/charts/_crds/gateway-api
