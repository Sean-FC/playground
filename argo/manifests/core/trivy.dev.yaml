apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trivy
  namespace: argo
spec:
  project: core
  destination:
    server: https://kubernetes.default.svc
    namespace: trivy
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: git@github.com:Sean-FC/playground.git
    targetRevision: main
    path: argo/charts/core/trivy
    helm:
      valueFiles:
        - values.dev.yaml
