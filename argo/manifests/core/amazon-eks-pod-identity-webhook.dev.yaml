apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: irsa
  namespace: argo
spec:
  project: core
  destination:
    server: https://kubernetes.default.svc
    namespace: irsa
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: git@github.com:Sean-FC/playground.git
    targetRevision: main
    path: argo/charts/core/amazon-eks-pod-identity-webhook
    helm:
      valueFiles:
        - values.yaml
