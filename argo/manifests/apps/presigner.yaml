apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: presigner
  namespace: argo
spec:
  project: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: presigner
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
  source:
    repoURL: git@github.com:Sean-FC/playground.git
    targetRevision: main
    path: argo/charts/apps/presigner
    helm:
      valueFiles:
        - values.dev.yaml
