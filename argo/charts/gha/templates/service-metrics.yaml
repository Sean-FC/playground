{{- if and .Values.controller.enabled .Values.controller.metrics.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gha.fullname" . }}-controller-metrics
  labels:
    {{- include "gha.labels" . | nindent 4 }}
    app.kubernetes.io/namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: {{ .Values.controller.metrics.service.port }}
      protocol: TCP
      targetPort: metrics
  selector:
    app.kubernetes.io/name: {{ include "gha.controllerName" . }}
    app.kubernetes.io/namespace: {{ .Release.Namespace }}
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
