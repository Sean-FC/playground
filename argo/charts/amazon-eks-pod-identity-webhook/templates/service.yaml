apiVersion: v1
kind: Service
metadata:
  name: {{ include "amazon-eks-pod-identity-webhook.serviceName" . }}
  namespace: {{ .Release.Namespace }}
{{- with .Values.service.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
  selector:
    app: {{ include "amazon-eks-pod-identity-webhook.fullname" . }}
