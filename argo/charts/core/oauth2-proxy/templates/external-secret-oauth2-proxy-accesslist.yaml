{{- if .Values.oauth2.authenticatedEmailsFile.enabled }}
{{- $remoteRefKey := required "oauth2ProxyAccesslistExternalSecret.remoteRef.key must be set" .Values.oauth2ProxyAccesslistExternalSecret.remoteRef.key }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-accesslist
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  secretStoreRef:
    name: parameterstore
    kind: ClusterSecretStore
  refreshInterval: 24h
  target:
    name: oauth2-proxy-accesslist
    creationPolicy: Owner
  data:
    - secretKey: restricted_user_access
      remoteRef:
        key: {{ $remoteRefKey | quote }}
        property: restricted_user_access
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
{{- end }}
