{{- if .Values.updater.ecr.enabled }}
{{- $registry := dict }}
{{- range .Values.updater.config.registries }}
{{- if eq .name "ECR" }}
{{- $registry = . }}
{{- end }}
{{- end }}
{{- if not (get $registry "api_url") }}
{{- fail "updater.ecr.enabled requires an updater.config.registries entry with name: ECR" }}
{{- end }}
{{- $host := trimPrefix "https://" (get $registry "api_url") }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.updater.ecr.secretName }}
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.updater.ecr.refreshInterval }}
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ECRAuthorizationToken
          name: ecr-auth-token
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: {{ .Values.updater.ecr.secretName }}
    template:
      type: kubernetes.io/dockerconfigjson
      metadata:
        annotations:
          expiresAt: "{{ `{{ .expires_at }}` }}"
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "{{`{{ .proxy_endpoint | replace "https://" "" }}`}}": {
                "username": "{{ `{{ .username }}` }}",
                "password": "{{ `{{ .password }}` }}",
                "auth": {{ `"{{ printf "%s:%s" .username .password | b64enc }}"` }}
              }
            }
          }
{{- end }}
