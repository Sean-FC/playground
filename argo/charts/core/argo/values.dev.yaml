argo-cd:
  global:
    domain: argocd.dev.enervate.io
  server:
    httproute:
      enabled: true
      hostnames:
        - argocd.dev.enervate.io
updater:
  enabled: true
  ecr:
    enabled: true
    secretName: ecr-docker
    refreshInterval: 11h
  podAnnotations:
    reloader.stakater.com/auto: "true"
  config:
    registries:
      - name: ECR
        api_url: https://266294491328.dkr.ecr.eu-west-1.amazonaws.com
        prefix: 266294491328.dkr.ecr.eu-west-1.amazonaws.com
        ping: yes
        insecure: false
        credentials: pullsecret:argo/ecr-docker
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::266294491328:role/dev-aws-argo-image-updater"
