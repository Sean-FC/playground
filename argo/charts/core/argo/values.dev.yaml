argo-cd:
  global:
    domain: argocd.dev.enervate.io
  server:
    httproute:
      enabled: true
      hostnames:
        - argocd.dev.enervate.io
argocd-image-updater:
  enabled: true
  config:
    registries:
      - name: ECR
        api_url: https://266294491328.dkr.ecr.eu-west-1.amazonaws.com
        prefix: 266294491328.dkr.ecr.eu-west-1.amazonaws.com
        ping: yes
        insecure: false
        credentials: ext:/scripts/ecr.sh
        credsexpire: 8h
  serviceAccount:
    name: argocd-image-updater
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::266294491328:role/dev-argocd-image-updater"
