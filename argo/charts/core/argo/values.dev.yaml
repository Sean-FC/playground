argo-cd:
  global:
    domain: argocd.dev.enervate.io
  server:
    ingress:
      enabled: true
      hostname: argocd-dev
    httproute:
      enabled: true
      hostnames:
        - argocd.dev.enervate.io
updater:
  enabled: true
  podAnnotations:
    reloader.stakater.com/auto: "true"
  imagePullSecrets:
    - name: ecr-docker
  config:
    registries:
      - name: ECR
        api_url: https://266294491328.dkr.ecr.eu-west-1.amazonaws.com
        prefix: 266294491328.dkr.ecr.eu-west-1.amazonaws.com
        ping: yes
        insecure: false
        credentials: pullsecret:argo/ecr-docker # provided by eso
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::266294491328:role/dev-aws-argo-image-updater"
