apiVersion: kueue.x-k8s.io/v1beta2
kind: Cohort
metadata:
  name: {{ .Values.gpuCohort.name }}
  labels:
    {{- include "kueue.labels" . | nindent 4 }}
spec:
  resourceGroups:
    - coveredResources:
        - {{ .Values.gpuResource.name }}
      flavors:
{{- range .Values.gpuCohort.quotas }}
        - name: {{ .flavor }}
          resources:
            - name: {{ $.Values.gpuResource.name }}
              nominalQuota: {{ .nominalQuota | quote }}
{{- end }}
