apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "amazon-eks-pod-identity-webhook.certificateName" . }}
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ include "amazon-eks-pod-identity-webhook.certificateSecretName" . }}
  commonName: "{{ include "amazon-eks-pod-identity-webhook.serviceName" . }}.{{ .Release.Namespace }}.svc"
  dnsNames:
  - "{{ include "amazon-eks-pod-identity-webhook.serviceName" . }}"
  - "{{ include "amazon-eks-pod-identity-webhook.serviceName" . }}.{{ .Release.Namespace }}"
  - "{{ include "amazon-eks-pod-identity-webhook.serviceName" . }}.{{ .Release.Namespace }}.svc"
  - "{{ include "amazon-eks-pod-identity-webhook.serviceName" . }}.{{ .Release.Namespace }}.svc.local"
  isCA: {{ .Values.certManager.certificate.isCA }}
  duration: {{ .Values.certManager.certificate.duration }}
  renewBefore: {{ .Values.certManager.certificate.renewBefore }}
  issuerRef:
    name: {{ include "amazon-eks-pod-identity-webhook.clusterIssuerName" . }}
    kind: {{ .Values.certManager.certificate.issuerRef.kind }}
